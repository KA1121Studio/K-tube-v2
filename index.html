<title>ホーム</title>

<style>
  *{box-sizing:border-box}
  html,body{height:0%;margin:0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;background:#fff;color:#111}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
header {
  position: fixed;               /* ← sticky → fixed に変更（完全に固定） */
  top: 0;
  left: 0;
  right: 0;                      /* 左右いっぱいに広げる */
  z-index: 1000;                 /* サイドバーより上に来るように高く */
  background: #fff;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  padding: 8px 16px;
  gap: 12px;
  height: 64px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1); /* 影を少し加えて浮いてる感を強調（任意） */
}

/* ヘッダーが固定になった分、bodyやメインに上余白を追加 */
body {
  padding-top: 64px;             /* ← headerの高さ分だけ下にずらす */
}

/* サイドバーのtopをheaderの下に調整（すでにtop:64px; ならOK） */
.sidebar-fixed {
  top: 64px;                     /* 変わらず */
}
  .logo{display:flex;align-items:center;gap:8px;cursor:pointer}
  .logo .icon{width:36px;height:36px;border-radius:6px;background:#ff0000;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .search{flex:1;display:flex;justify-content:center}
  .search input{width:100%;max-width:720px;padding:10px 14px;border-radius:20px;border:1px solid #ddd;outline:none}
  .actions{display:flex;gap:12px;align-items:center}
  main{display:flex;gap:20px;padding:16px;align-items:flex-start}
  .content{flex:1}
  .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{cursor:pointer}
  .thumb{position:relative;border-radius:6px;overflow:hidden;background:#eee}
  .thumb img{width:100%;height:auto;display:block}
  .meta{display:flex;gap:12px;margin-top:8px}
  .channel-thumb{width:36px;height:36px;border-radius:50%;flex:0 0 36px;background:#ddd;overflow:hidden}
  .meta .info{flex:1}
  .meta .info .title{font-weight:600;line-height:1.2;margin-bottom:6px}
  .meta .info .sub{color:#606060;font-size:13px}
  .watch-container{display:flex;gap:20px}
  .main-col{flex:0 0 60%}
  .side-col{flex:0 0 40%}
  .player-box{background:#000;aspect-ratio:16/9;border-radius:6px;overflow:hidden}
  .player-meta{margin-top:12px}
  .player-meta h1{font-size:18px;margin:0 0 8px 0}
  .stats{color:#606060;font-size:13px;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap}
  .channel-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid #eee;border-bottom:1px solid #eee;margin-top:12px}
  .channel-row img{width:48px;height:48px;border-radius:50%;overflow:hidden}
  .channel-row .ch-info{flex:1}
  .btn-sub{background:#cc0000;color:#fff;padding:8px 12px;border-radius:16px;font-weight:700;cursor:pointer}
  .comments{margin-top:12px}
  .comment{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0}
  .comment img{width:36px;height:36px;border-radius:50%}
  .comment .c-body{flex:1}
  .comment .c-body .name{font-weight:700;font-size:13px}
  .comment .c-body .text{color:#333;margin-top:6px}
  .related-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
  .related-thumb{width:168px;flex:0 0 168px;overflow:hidden;border-radius:6px}
  .related-info{flex:1}
  .related-info .title{font-size:14px;font-weight:600}
  @media(max-width:900px){
    main{padding:12px}
    .watch-container{flex-direction:column}
    .main-col,.side-col{flex:1 1 100%}
    .related-thumb{width:120px;flex:0 0 120px}
    .search input{max-width:420px}
  }
  .watch-container { display: flex; gap: 20px; height: calc(100vh - 64px - 32px); }
  .main-col { flex: 0 0 60%; display: flex; flex-direction: column; overflow-y: auto; padding-right: 4px; }
  .side-col { flex: 0 0 40%; display: flex; flex-direction: column; overflow-y: auto; padding-left: 4px; }
  .player-box { flex: 0 0 auto; }
  .comments { flex: 1 1 auto; overflow-y: auto; }
.btn-sub.disabled {
  opacity: 0.4;
  pointer-events: none;
}

 /* メニューアイコン（hamburger） */
.menu-btn {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 50%;
  transition: background 0.2s;
}
.menu-btn:hover {
  background: #f0f0f0;
}
.menu-btn svg {
  width: 24px;
  height: 24px;
  fill: #0f0f0f;
}

/* サイドメニュー */
.sidebar {
  position: fixed;
  top: 0;
  left: -280px; /* 隠す */
  width: 280px;
  height: 100%;
  background: white;
  z-index: 1000;
  box-shadow: 2px 0 8px rgba(0,0,0,0.2);
  transition: left 0.3s ease;
  overflow-y: auto;
}
.sidebar.open {
  left: 0;
}

/* オーバーレイ（外を押すと閉じる） */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.open {
  opacity: 1;
  pointer-events: auto;
}

/* メニューアイテム */
.menu-item {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 12px 24px;
  font-size: 14px;
  color: #0f0f0f;
  cursor: pointer;
}
.menu-item:hover {
  background: #f2f2f2;
}
.menu-item svg {
  width: 24px;
  height: 24px;
  fill: #606060;
}
.menu-item.active svg {
  fill: #065fd4; /* YouTubeの青 */
}

/* 固定左サイドバー（幅小さめ） */
.sidebar-fixed {
  position: fixed;
  top: 64px;
  left: 0;
  width: 72px;                   /* ここがバーの幅 */
  height: calc(100vh - 64px);
  background: #fff;
  border-right: 1px solid #ddd;
  overflow-y: auto;
  z-index: 30;
  transition: width 0.3s ease;
}

/* ホバーで広げる（任意） */
.sidebar-fixed:hover {
  width: 240px;
}

/* 固定左サイドバー（幅小さめ） */
.sidebar-fixed {
  position: fixed;
  top: 64px;
  left: 0;
  width: 72px;                   /* バーの幅（ここを変えてもOK） */
  height: calc(100vh - 64px);
  background: #fff;
  border-right: 1px solid #ddd;
  overflow-y: auto;
  z-index: 30;
}

/* メインコンテンツを完全にバーの幅に合わせる（隙間防止） */
main.content-main {
  margin-left: 72px !important;  /* バーの幅と完全に一致させる */
  width: calc(100% - 72px) !important;  /* 右端まで広げる */
  padding: 16px;                 /* 元のpaddingはそのまま */
  min-height: calc(100vh - 64px);
  box-sizing: border-box;
}

/* モバイル時はフル幅に戻す */
@media (max-width: 900px) {
  .sidebar-fixed {
    display: none;               /* 完全に非表示に（ハンバーガーだけ残す） */
  }
  main.content-main {
    margin-left: 0 !important;
    width: 100% !important;
  }
}

/* メニューアイテム（アイコン + 下に文字） */
.sidebar-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 8px;
  margin: 4px 8px;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
  text-align: center;
  font-size: 12px;
  color: #0f0f0f;
}

.sidebar-item:hover {
  background: #f2f2f2;
}

.sidebar-item.active {
  background: #fee2e2; /* 薄い赤（YouTube風） */
  color: #cc0000;
}

.sidebar-item svg {
  width: 24px;
  height: 24px;
  margin-bottom: 4px;
  fill: #606060;
}

.sidebar-item.active svg {
  fill: #cc0000; /* YouTube赤 */
}

/* メインコンテンツを右にずらす（サイドバー分） */
main.content-main {
  margin-left: 240px; /* サイドバー幅 */
  transition: margin-left 0.3s;
}

@media (max-width: 900px) {
  main.content-main {
    margin-left: 0;
  }
}

/* 再生画面（watchページ）では左サイドバーを非表示にする */
body.watch-page .sidebar-fixed {
  display: none;
}

/* メインコンテンツもフル幅に戻す（左マージンなし） */
body.watch-page main.content-main {
  margin-left: 0 !important;
  width: 100% !important;
}

/* ゲームカードもホームと同じスタイルを流用 */
#gameGrid .card .thumb img {
  aspect-ratio: 16/9;          /* 動画と同じ比率で統一 */
  object-fit: cover;
}

/* ツール/ゲームのプレイ画面をフル領域に */
.play-fullscreen {
  position: fixed;
  top: 64px;                     /* headerの高さ分 */
  left: 72px;                    /* 左サイドバーの幅分 */
  right: 0;
  bottom: 0;
  z-index: 20;                   /* headerより下だけどコンテンツの上 */
  background: #000;              /* 黒背景で没入感 */
  overflow: hidden;
}

/* iframeを完全にフィット */
.play-fullscreen iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* モバイル対応（左バー非表示時） */
@media (max-width: 900px) {
  .play-fullscreen {
    left: 0;                     /* モバイルでは左端まで */
  }
}

    <script>
      /* YouTube風シングルファイルデモ（Piped API + yt-dlp再生URL版） */
      const PIPED_API_BASE = '/piped';
      const MAX_RESULTS = 12;
      const el = id => document.getElementById(id);
      const app = el('app');
      const searchInput = el('searchInput');
      const homeBtn = el('homeBtn');

      let channelThumbCache = {};
      let homeLoading = false;
      let observerMap = new Map();

      // commentsPageToken はここで1回だけ宣言（重複なし）
      let commentsPageToken = {};

   function fmtNum(n) {
  if (n == null || isNaN(n)) return '0';
  n = Number(n);
  
  // 整数部分を3桁ごとにカンマで区切る
  return n.toLocaleString('en-US');
}

      function timeAgo(dateStr){
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const s = Math.floor((Date.now()-d.getTime())/1000);
        if(s<60) return s + '秒前';
        if(s<3600) return Math.floor(s/60)+'分前';
        if(s<86400) return Math.floor(s/3600)+'時間前';
        if(s<2592000) return Math.floor(s/86400)+'日前';
        if(s<31536000) return Math.floor(s/2592000)+'ヶ月前';
        return Math.floor(s/31536000)+'年以上前';
      }

      async function pipedFetch(endpoint, params = {}) {
        let path = endpoint.startsWith('/') ? endpoint : '/' + endpoint;
        const queryString = new URLSearchParams(params).toString();
        const fullPath = queryString ? `${path}?${queryString}` : path;
        const response = await fetch(`${PIPED_API_BASE}${fullPath}`, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        if (!response.ok) {
          throw new Error(`Piped proxy error: ${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      async function getChannelThumbPiped(channelId) {
        if (channelThumbCache[channelId]) return channelThumbCache[channelId];
        try {
          const data = await pipedFetch(`/channel/${channelId}`);
          const thumb = data.avatarUrl || '';
          channelThumbCache[channelId] = thumb;
          return thumb;
        } catch (e) {
          console.warn('channel thumb failed', e);
          return '';
        }
      }

      window.addEventListener('hashchange', renderByHash);
      homeBtn.addEventListener('click', () => { location.hash = ''; });
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') performSearch(searchInput.value.trim());
      });
      renderByHash();

      function renderByHash() {
        const h = location.hash.slice(1);
        if (!h) return renderHome();
        const [k, v] = h.split('=');
        if (k === 'watch') return renderWatch(v);
        if (k === 'channel') return renderChannel(v);
        if (k === 'search') {
          searchInput.value = decodeURIComponent(v || '');
          performSearch(decodeURIComponent(v || ''));
          return;
        }
        renderHome();
      }

     // 現在のパス（ハッシュ）でアクティブ項目をハイライト
function updateSidebarActive() {
  const hash = location.hash.slice(1);
  const items = document.querySelectorAll('.sidebar-item');

  items.forEach(item => {
    item.classList.remove('active');
    if ((hash === '' && item.dataset.target === 'home') ||
        hash.startsWith('watch=') ||
        hash.startsWith('channel=') ||
        hash.startsWith('games') ||
        hash.startsWith('tools')) {  // ← toolsも追加
      if (item.dataset.target === 'home' && !hash.startsWith('games') && !hash.startsWith('tools')) {
        item.classList.add('active');
      } else if (item.dataset.target === 'games' && hash.startsWith('games')) {
        item.classList.add('active');
      } else if (item.dataset.target === 'tools' && hash.startsWith('tools')) {
        item.classList.add('active');
      }
    }
  });
}

// ページ読み込み時 + hash変更時に更新
window.addEventListener('hashchange', updateSidebarActive);
window.addEventListener('load', updateSidebarActive);

// アイテムクリックでホームに戻る（今は全部ホームに飛ばすだけ）
document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('click', () => {
    const target = item.dataset.target;

    // アクティブクラス更新
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');

    if (target === 'home') {
      location.hash = '';
    } else if (target === 'games') {
      location.hash = 'games';
      renderGames();
    } else if (target === 'tools') {
      location.hash = 'tools';          // ← 新しく追加
      renderTools();                    // ← 新しい関数呼び出し
    }
    // 他のメニュー（履歴・設定）は後で
  });
});

// 新しい関数：ゲーム一覧画面を表示
function renderGames() {
  app.innerHTML = `
    <section id="gamesSection">
      <div style="margin:16px 0 8px; font-weight:700; font-size:20px; color:#0f0f0f;">
        ゲーム

  `;

  loadGames();

// ゲームデータを読み込んでカードを表示（仮データ）
async function loadGames() {
  const grid = document.getElementById('gameGrid');
  if (!grid) return;

  // 仮のゲームデータ（後で本物に置き換え）
  const fakeGames = [
    {
      title: "2048",
      thumbnail: "https://img.itch.zone/aW1nLzE1NzM5NzQ5LnBuZw==/original/%2B%2B%2B%2B8.png",
      embedUrl: "https://playcanv.as/p/2OlkU6tU/",  // 無料の2048ゲーム例
      description: "数字を合わせて2048を目指そう！"
    },
    {
      title: "Flappy Bird Clone",
      thumbnail: "https://img.itch.zone/aW1nLzE1NzM5NzQ5LnBuZw==/original/%2B%2B%2B%2B8.png", // 仮サムネ
      embedUrl: "https://www.crazygames.com/embed/flappy-bird-clone",
      description: "パイプを避けて飛ぼう"
    },
    {
      title: "Snake Game",
      thumbnail: "https://img.itch.zone/aW1nLzE1NzM5NzQ5LnBuZw==/original/%2B%2B%2B%2B8.png",
      embedUrl: "https://plays.org/snake/",
      description: "クラシックなスネークゲーム"
    },
    // ここにどんどん追加可能
  ];

  fakeGames.forEach(game => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="thumb" data-game="${game.embedUrl}">
        <img src="${game.thumbnail}" alt="${game.title}" style="aspect-ratio:16/9; object-fit:cover;">
      </div>
      <div class="meta">
        <div class="info">
          <div class="title">${escapeHtml(game.title)}</div>
          <div class="sub">${escapeHtml(game.description || '')}</div>
        </div>
      </div>
    `;

    // クリックでゲーム再生画面へ
    card.querySelector('.thumb').addEventListener('click', () => {
      location.hash = `playgame=${encodeURIComponent(game.embedUrl)}`;
      renderGamePlay(game);
    });

    grid.appendChild(card);
  });
}

// 新しい関数：ゲームプレイ画面（iframe埋め込み）
function renderGamePlay(game) {
  app.innerHTML = `
    <div class="play-fullscreen">
      <iframe 
        src="${game.embedUrl}" 
        frameborder="0" 
        allowfullscreen
      ></iframe>
    </div>
  `;
}
